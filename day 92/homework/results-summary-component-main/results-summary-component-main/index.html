<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="style.css">
<body>

  <div class="parent">

    <div class="parent1">

      <p class="p1">Your Result</p>

      <div class="inside">

        <h1>76</h1>

        <p>of 100</p>

      </div>

      <h2>Great</h2>

      <p class="desc">You scored higher than 65% of <br> the people who have taken <br> these tests.</p>

    </div>

    <div class="parent2">

      <p class="para">Summary</p>

      <div class="first">

        <img src="./assets/images/icon-reaction.svg" alt="">

        <p class="opp">Reaction</p>

        <p class="pppp"> <strong>80</strong> / 100</p>

      </div>

      <div class="second">

        <img src="./assets/images/icon-memory.svg" alt="">

        <p class="kk">Memory</p>

        <p class="kkk"><strong>92</strong> / 100</p>

      </div>

      <div class="third">

        <img src="./assets/images/icon-verbal.svg" alt="">

        <p class="ll">Verbal</p>

        <p class="lll"><strong>61</strong> / 100</p>

      </div>

      <div class="fourth">

        <img src="./assets/images/icon-visual.svg" alt="">

        <p class="iii">Visual</p>

        <p class="iiii"><strong>73</strong> / 100 </p>

      </div>

      <button>Continue</button>

    </div>

  </div>
  
</body>
</html>
